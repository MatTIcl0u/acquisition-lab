<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Candidature reçue 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --green: #22C55E;
    --green-glow: rgba(34,197,94,0.08);
    --green-border: rgba(34,197,94,0.2);
    --white: #F5F5F5;
    --muted: #555555;
    --muted2: #333333;
    --line: rgba(255,255,255,0.05);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    min-height: 100%;
    min-height: 100svh;
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ── SUBTLE GRAIN ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GRID ── */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 72px 72px;
    pointer-events: none;
    z-index: 0;
    -webkit-mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, black 0%, transparent 100%);
    mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, black 0%, transparent 100%);
  }

  /* ── GLOW ── */
  .glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
    50% { opacity:0.6; transform:translate(-50%,-50%) scale(1.15); }
  }

  /* ── LAYOUT ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 80px;
    text-align: center;
  }

  /* ── LOGO ── */
  .logo-wrap {
    margin-bottom: 52px;
    animation: fadeUp 0.5s ease both;
  }
  .logo-wrap img {
    height: 40px;
    width: auto;
    filter: invert(1);
    display: block;
  }

  /* ── CHECK ── */
  .check-wrap {
    position: relative;
    width: 64px;
    height: 64px;
    margin-bottom: 40px;
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both 0.1s;
  }

  @keyframes popIn {
    from { opacity:0; transform:scale(0.4); }
    to { opacity:1; transform:scale(1); }
  }

  .check-outer {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid var(--green-border);
    animation: ringFade 0.6s ease both 0.5s;
    opacity: 0;
  }

  @keyframes ringFade {
    from { opacity:0; transform:scale(0.8); }
    to { opacity:1; transform:scale(1); }
  }

  .check-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--green-glow);
    border: 1.5px solid var(--green-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-circle svg {
    animation: drawCheck 0.35s ease both 0.45s;
    opacity: 0;
  }

  @keyframes drawCheck {
    from { opacity:0; transform:scale(0.5) rotate(-15deg); }
    to { opacity:1; transform:scale(1) rotate(0deg); }
  }

  /* ── CONTENT ── */
  h1 {
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin-bottom: 18px;
    animation: fadeUp 0.5s ease both 0.2s;
  }

  h1 .green { color: var(--green); }

  .subtitle {
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--muted);
    font-weight: 300;
    line-height: 1.7;
    max-width: 340px;
    margin-bottom: 48px;
    animation: fadeUp 0.5s ease both 0.3s;
  }

  .subtitle strong {
    color: #999;
    font-weight: 400;
  }

  /* ── SEPARATOR ── */
  .sep {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--green-border), transparent);
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease both 0.35s;
  }

  /* ── STEPS ── */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    animation: fadeUp 0.5s ease both 0.4s;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted2);
    transition: background 0.3s;
  }

  .step-dot.active {
    background: var(--green);
    box-shadow: 0 0 8px rgba(34,197,94,0.5);
  }

  .step-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .step-label.active {
    color: var(--green);
  }

  .step-line {
    width: 56px;
    height: 1px;
    background: var(--muted2);
    margin-bottom: 18px;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px 24px 28px;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.05em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .logo-wrap img { height: 32px; }
    .step-line { width: 36px; }
    h1 { letter-spacing: -0.02em; }
  }

  @media (max-width: 360px) {
    .step-line { width: 24px; }
    .step-label { font-size: 10px; }
  }
</style>
</head>
